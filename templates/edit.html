<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Expense</h1>
        <form method="POST">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ expense.title }}" required>

            <label for="amount">Amount:</label>
            <input type="number" step="0.01" id="amount" name="amount" value="{{ expense.amount }}" required>

            <label for="category">Category:</label>
            <input type="text" id="category" name="category" value="{{ expense.category }}" required>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" value="{{ expense.date.strftime('%Y-%m-%d') }}" required>

            <button type="submit">Save Changes</button>
            <a href="{{ url_for('home') }}">Cancel</a>
        </form>
    </div>
</body>
</html>
